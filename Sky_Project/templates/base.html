<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sky Project{% endblock %}</title>

    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'messages:inbox' %}">Sky Project</a>

            <div class="ms-auto">
                {% if user.is_authenticated %}
                    <span class="me-3">Hello, {{ user.username }}</span>

                    {% if user.is_staff %}
                        <a href="/admin/" class="btn btn-sm btn-outline-dark me-2">Admin</a>
                    {% endif %}

                    <a href="{% url 'logout' %}" class="btn btn-sm btn-danger">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-primary me-2">Login</a>
                    <a href="{% url 'signup' %}" class="btn btn-sm btn-success">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div class="alert 
                    {% if message.tags == 'error' %}alert-danger
                    {% elif message.tags == 'success' %}alert-success
                    {% else %}alert-info
                    {% endif %}
                    alert-dismissible fade show" role="alert">

                    {{ message }}

                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
