{% extends "messages/base_messages.html" %}

{% block title %}Draft{% endblock %}

{% block messages_content %}
<h1 class="mb-4">Draft</h1>

<!-- lists messages saved as drafts -->
<div class="list-group">
    {% for message in draft_messages %}
        <!-- each draft links to the detail page where it can be edited, sent or deleted -->
        <a href="{% url 'messages:message_detail' message.id %}" class="list-group-item list-group-item-action">
            <strong>{{ message.recipient.username }}</strong> - {{ message.subject }}
        </a>
    {% empty %}
        <!-- shown when there are no draft messages -->
        <div class="list-group-item text-center text-muted">
            No draft messages found.
        </div>
    {% endfor %}
</div>
{% endblock %}
