{% extends "base.html" %}

{% block title %}Enter New Password{% endblock %}

{% block content %}
<!-- centres the new password form -->
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <!-- card layout keeps the password reset page consistent with login and signup -->
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h2 mb-4">Enter new password</h1>

                <!-- only shows the form if the reset link is valid -->
                {% if validlink %}
                    <form method="POST">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit" class="btn btn-primary w-100">
                            Change Password
                        </button>
                    </form>
                {% else %}
                    <!-- shown if the reset link is invalid or expired -->
                    <p>This password reset link is invalid or has expired.</p>
                    <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">
                        Request new reset link
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
