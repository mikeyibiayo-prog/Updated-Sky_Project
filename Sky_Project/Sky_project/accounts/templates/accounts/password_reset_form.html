{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<!-- centres the password reset form -->
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <!-- card layout keeps the form clear and simple -->
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h2 mb-3">Reset Password</h1>
                <p>Enter your email address to receive a reset link.</p>

                <!-- form sends the user's email to Django's password reset view -->
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100">Send Reset Email</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
